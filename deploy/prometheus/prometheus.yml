global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: loto-ultime
    environment: production

scrape_configs:
  - job_name: loto-ultime-backend
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
