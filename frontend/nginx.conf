# Rate limiting zone: 10 req/s per IP for API
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Hide server version ──
    server_tokens off;

    # ── Gzip ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # ── Security headers ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Request size limit ──
    client_max_body_size 1m;

    # ── SPA routing ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static assets caching ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API reverse proxy → backend (rate limited) ──
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # Hide backend headers
        proxy_hide_header X-Powered-By;
    }

    # ── Health (internal only — not rate limited) ──
    location /health {
        proxy_pass http://backend:8000/health;
    }

    # ── Metrics (internal only) ──
    location /metrics {
        proxy_pass http://backend:8000/metrics;
    }

    # ── Block common attack paths ──
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* /(wp-admin|wp-login|phpmyadmin|admin\.php) {
        deny all;
        return 404;
    }
}
