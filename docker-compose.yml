services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - sqlite-data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///data/loto_ultime.db
      - SCHEDULER_ENABLED=true
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite-data:
