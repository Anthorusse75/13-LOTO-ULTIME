services:
  # ── PostgreSQL (réseau partagé shared-db) ──────────────────
  postgres:
    image: postgres:16-alpine
    container_name: loto-ultime-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-loto_ultime}
      POSTGRES_USER: ${POSTGRES_USER:-loto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - default
      - shared-db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loto} -d ${POSTGRES_DB:-loto_ultime}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend (FastAPI + PostgreSQL) ─────────────────────────
  backend:
    build: ./backend
    container_name: loto-ultime-backend
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-loto}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-loto_ultime}
      - SCHEDULER_ENABLED=true
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - APP_ENV=${APP_ENV:-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost"]}
      - LOG_LEVEL=INFO
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@loto-ultime.local}
      - ADMIN_INITIAL_PASSWORD=${ADMIN_INITIAL_PASSWORD:?ADMIN_INITIAL_PASSWORD must be set in .env}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-30}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/health'')"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Frontend (Nginx + React SPA) ───────────────────────────
  frontend:
    build: ./frontend
    container_name: loto-ultime-frontend
    ports:
      - "${FRONTEND_PORT:-3080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Observability stack ────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: loto-ultime-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:11.1.0
    container_name: loto-ultime-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set in .env}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  shared-db:
    name: shared-db
    driver: bridge
